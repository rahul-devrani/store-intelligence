version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: store_intelligence_api

    ports:
      - "8000:8000"

    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs

    environment:
      PYTHONUNBUFFERED: "1"
      DB_PATH: /app/data/store_intelligence.db
      SALES_CSV_PATH: /app/data/pos_transactions.csv
      API_BASE_URL: http://localhost:8000

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s